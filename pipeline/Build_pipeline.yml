trigger:
- master

stages:
  - stage: build
    jobs: 
      - job: job
        pool: 
          vmImage: 'ubuntu-latest'
        steps:

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'
          - task: TerraformTask@5
            displayName: tf init
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'Infrastructure_deployment_Project_SPN'
              backendAzureRmOverrideSubscriptionID: 'a4961ebf-0d9d-485a-aaad-0e1d2075eaf6'
              backendAzureRmResourceGroupName: 'resourceGroup'
              backendAzureRmStorageAccountName: 'devstoragetfstate'
              backendAzureRmContainerName: 'tfstatecontainer'
              backendAzureRmKey: 'Alpha.tfstate'

          - task: TerraformTask@5
            displayName: tf validate
            inputs:
              provider: 'azurerm'
              command: 'validate'

          - task: TerraformTask@5
            displayName: tf fmt
            inputs:
              provider: 'azurerm'
              command: 'custom'
              outputTo: 'console'
              customCommand: 'fmt'
              environmentServiceNameAzureRM: 'Infrastructure_deployment_Project_SPN'

          - task: TerraformTask@5
            displayName: tf plan
            inputs:
              provider: 'azurerm'
              command: 'plan'
              commandOptions: '-out $(Build.SourcesDirectory)/tfplanfile'
              environmentServiceNameAzureRM: 'Infrastructure_deployment_Project_SPN'
              environmentAzureRmOverrideSubscriptionID: 'a4961ebf-0d9d-485a-aaad-0e1d2075eaf6'

          - task: ArchiveFiles@2
            displayName: archive files
            inputs:
              rootFolderOrFile: '$(Build.SourcesDirectory)/'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
              replaceExistingArchive: true

          - task: PublishBuildArtifacts@1
            inputs:
               PathtoPublish: '$(Build.ArtifactStagingDirectory)'
               ArtifactName: 'terraform-build'
               publishLocation: 'Container'